services:
  postgres:
    image: postgres:16-alpine
    container_name: issuetracker_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tracker_user
      POSTGRES_PASSWORD: tracker_password
      POSTGRES_DB: issuetracker
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./tables.sql:/docker-entrypoint-initdb.d/tables.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker_user -d issuetracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: .
    ports:
      - "3001:3001"
    environment:
      dbConnStr: "postgres://tracker_user:tracker_password@postgres:5432/issuetracker"
      jwtSecret: "your-secret-key-change-in-production"
      allowedOrigins: "http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
